name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  VCPKG_ROOT: ${{ github.workspace }}/.vcpkg

jobs:
  windows:
    name: Windows MSVC
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository hygiene
        shell: pwsh
        run: ./scripts/check_repo_hygiene.ps1

      - name: Initialize MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure
        run: cmake --preset windows-msvc-debug

      - name: Build
        run: cmake --build --preset windows-msvc-debug

      - name: Test
        run: ctest --preset windows-msvc-debug

  linux:
    name: Linux GCC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository hygiene
        shell: pwsh
        run: ./scripts/check_repo_hygiene.ps1

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config curl zip unzip tar

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        run: cmake --preset linux-gcc-debug

      - name: Build
        run: cmake --build --preset linux-gcc-debug

      - name: Test
        run: ctest --preset linux-gcc-debug
